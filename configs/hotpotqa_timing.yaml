# HotpotQA timing benchmark — component-level timing for each strategy
models:
  - /scratch/xt2251/models/Qwen3-14B

dataset: hotpotqa
device: "cuda:0"

top_p: 0.15
lego_k: 5
batch_size: 4
default_split: true
chunk_size: 1024
layer_indices: null

use_varlen: true
num_recompute_chunks: 1
recompute_attention_mode: flashinfer

max_new_tokens: 32
num_samples: 50
warmup_samples: 1

strategies:
  - name: baseline
  - name: no_recompute
  - name: guided_recompute
    method: norm
  - name: cacheblend
  - name: lego
